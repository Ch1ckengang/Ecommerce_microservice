name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Compose is available
        run: docker compose version

      - name: Run backend verification and containerized API tests
        run: make ci-backend

      - name: Show compose status on failure
        if: failure()
        run: docker compose ps

      - name: Show recent logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200
