{% load static %}
<nav class="bg-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="{% url 'pages:home' %}" class="text-2xl font-bold text-indigo-600">
                    E-Commerce
                </a>
            </div>
            
            <!-- Search Bar -->
            <div class="hidden md:flex flex-1 mx-8">
                <form action="{% url 'pages:products_list' %}" method="get" class="w-full max-w-2xl">
                    <div class="relative">
                        <input 
                            type="text" 
                            name="search" 
                            placeholder="Tìm kiếm sản phẩm..." 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                        >
                        <button type="submit" class="absolute right-2 top-2 text-gray-500 hover:text-indigo-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Navigation Links -->
            <div class="flex items-center space-x-6">
                <a href="{% url 'pages:products_list' %}" class="text-gray-700 hover:text-indigo-600">
                    Sản phẩm
                </a>
                
                <a href="{% url 'pages:cart' %}" class="relative text-gray-700 hover:text-indigo-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full min-w-5 h-5 px-1 flex items-center justify-center">
                        {{ request.session.cart_count|default:0 }}
                    </span>
                </a>
                
                {% if request.session.user_id %}
                <div class="relative group">
                    <button type="button" class="flex items-center text-gray-700 hover:text-indigo-600 focus:text-indigo-600 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden group-hover:block group-focus-within:block z-50">
                        <a href="{% url 'pages:profile' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            Tài khoản
                        </a>
                        <a href="{% url 'pages:orders_list' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            Đơn hàng
                        </a>
                        <a href="{% url 'pages:logout' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            Đăng xuất
                        </a>
                    </div>
                </div>
                {% else %}
                <a href="{% url 'pages:login' %}" class="text-gray-700 hover:text-indigo-600">
                    Đăng nhập
                </a>
                <a href="{% url 'pages:register' %}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                    Đăng ký
                </a>
                {% endif %}
            </div>
        </div>
        <form action="{% url 'pages:products_list' %}" method="get" class="md:hidden pb-4">
            <div class="relative">
                <input 
                    type="text" 
                    name="search" 
                    placeholder="Tìm kiếm sản phẩm..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
                <button type="submit" class="absolute right-2 top-2 text-gray-500 hover:text-indigo-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</nav>
