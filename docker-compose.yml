services:
  product-db:
    image: postgres:16-alpine
    container_name: product-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PRODUCT_DB_NAME}
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER} -d ${PRODUCT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-service:
    build:
      context: ./services/product-service
    container_name: product-service
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      INTERNAL_SERVICE_TOKEN: ${SERVICE_INTERNAL_TOKEN}
      DB_NAME: ${PRODUCT_DB_NAME}
      DB_USER: ${PRODUCT_DB_USER}
      DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      DB_HOST: product-db
      DB_PORT: ${PRODUCT_DB_PORT}
    volumes:
      - ./services/product-service:/app
    ports:
      - "${PRODUCT_SERVICE_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      product-db:
        condition: service_healthy

  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${USER_DB_NAME}
      MYSQL_USER: ${USER_DB_USER}
      MYSQL_PASSWORD: ${USER_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - user_db_data:/var/lib/mysql
      - ./services/db-init/mysql-user:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_LIFETIME: ${JWT_ACCESS_TOKEN_LIFETIME}
      JWT_REFRESH_TOKEN_LIFETIME: ${JWT_REFRESH_TOKEN_LIFETIME}
      DB_NAME: ${USER_DB_NAME}
      DB_USER: ${USER_DB_USER}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      DB_HOST: user-db
      DB_PORT: ${USER_DB_PORT}
    volumes:
      - ./services/user-service:/app
    ports:
      - "${USER_SERVICE_PORT:-8002}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      user-db:
        condition: service_healthy

  cart-db:
    image: mysql:8.0
    container_name: cart-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${CART_DB_NAME}
      MYSQL_USER: ${CART_DB_USER}
      MYSQL_PASSWORD: ${CART_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - cart_db_data:/var/lib/mysql
      - ./services/db-init/mysql-cart:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  cart-service:
    build:
      context: ./services/cart-service
    container_name: cart-service
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_NAME: ${CART_DB_NAME}
      DB_USER: ${CART_DB_USER}
      DB_PASSWORD: ${CART_DB_PASSWORD}
      DB_HOST: cart-db
      DB_PORT: ${CART_DB_PORT}
    volumes:
      - ./services/cart-service:/app
    ports:
      - "${CART_SERVICE_PORT:-8003}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      cart-db:
        condition: service_healthy

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d ${ORDER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-service:
    build:
      context: ./services/order-service
    container_name: order-service
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_NAME: ${ORDER_DB_NAME}
      DB_USER: ${ORDER_DB_USER}
      DB_PASSWORD: ${ORDER_DB_PASSWORD}
      DB_HOST: order-db
      DB_PORT: ${ORDER_DB_PORT}
      PRODUCT_SERVICE_URL: http://product-service:8000
      PRODUCT_SERVICE_TOKEN: ${SERVICE_INTERNAL_TOKEN}
      PRODUCT_SERVICE_MAX_RETRIES: ${PRODUCT_SERVICE_MAX_RETRIES}
      PRODUCT_SERVICE_RETRY_BACKOFF: ${PRODUCT_SERVICE_RETRY_BACKOFF}
    volumes:
      - ./services/order-service:/app
    ports:
      - "${ORDER_SERVICE_PORT:-8004}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      order-db:
        condition: service_healthy

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME}
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: ./services/payment-service
    container_name: payment-service
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_NAME: ${PAYMENT_DB_NAME}
      DB_USER: ${PAYMENT_DB_USER}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      DB_HOST: payment-db
      DB_PORT: ${PAYMENT_DB_PORT}
      ORDER_SERVICE_URL: http://order-service:8000
      ORDER_SERVICE_MAX_RETRIES: ${ORDER_SERVICE_MAX_RETRIES}
      ORDER_SERVICE_RETRY_BACKOFF: ${ORDER_SERVICE_RETRY_BACKOFF}
    volumes:
      - ./services/payment-service:/app
    ports:
      - "${PAYMENT_SERVICE_PORT:-8005}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      payment-db:
        condition: service_healthy

  shipping-db:
    image: mysql:8.0
    container_name: shipping-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${SHIPPING_DB_NAME}
      MYSQL_USER: ${SHIPPING_DB_USER}
      MYSQL_PASSWORD: ${SHIPPING_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - shipping_db_data:/var/lib/mysql
      - ./services/db-init/mysql-shipping:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  shipping-service:
    build:
      context: ./services/shipping-service
    container_name: shipping-service
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_NAME: ${SHIPPING_DB_NAME}
      DB_USER: ${SHIPPING_DB_USER}
      DB_PASSWORD: ${SHIPPING_DB_PASSWORD}
      DB_HOST: shipping-db
      DB_PORT: ${SHIPPING_DB_PORT}
      ORDER_SERVICE_URL: http://order-service:8000
      ORDER_SERVICE_MAX_RETRIES: ${ORDER_SERVICE_MAX_RETRIES}
      ORDER_SERVICE_RETRY_BACKOFF: ${ORDER_SERVICE_RETRY_BACKOFF}
    volumes:
      - ./services/shipping-service:/app
    ports:
      - "${SHIPPING_SERVICE_PORT:-8006}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      shipping-db:
        condition: service_healthy

  frontend-db:
    image: postgres:16-alpine
    container_name: frontend-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FRONTEND_DB_NAME:-frontend_db}
      POSTGRES_USER: ${FRONTEND_DB_USER:-frontend_user}
      POSTGRES_PASSWORD: ${FRONTEND_DB_PASSWORD:-frontend_password}
    volumes:
      - frontend_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FRONTEND_DB_USER:-frontend_user} -d ${FRONTEND_DB_NAME:-frontend_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend-service:
    build:
      context: ./services/frontend_service
    container_name: frontend-service
    restart: unless-stopped
    environment:
      DEBUG: ${DJANGO_DEBUG}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: localhost,127.0.0.1,frontend-service
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${FRONTEND_DB_NAME:-frontend_db}
      DB_USER: ${FRONTEND_DB_USER:-frontend_user}
      DB_PASSWORD: ${FRONTEND_DB_PASSWORD:-frontend_password}
      DB_HOST: frontend-db
      DB_PORT: 5432
      USER_SERVICE_URL: http://user-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      CART_SERVICE_URL: http://cart-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      SHIPPING_SERVICE_URL: http://shipping-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - ./services/frontend_service:/app
    ports:
      - "${FRONTEND_SERVICE_PORT:-8007}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      frontend-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

  # Neo4j for AI Service
  neo4j:
    image: neo4j:5.15.0
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Service
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8008}:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - USER_SERVICE_URL=http://user-service:8000
    volumes:
      - ./services/ai-service/data:/app/data
      - ./services/ai-service/models:/app/models
      - ./services/ai-service/logs:/app/logs
    depends_on:
      neo4j:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    restart: unless-stopped
    volumes:
      - ./api-gateway/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${API_GATEWAY_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/ | grep -q api-gateway-ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      product-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy

volumes:
  product_db_data:
  user_db_data:
  cart_db_data:
  order_db_data:
  payment_db_data:
  shipping_db_data:
  frontend_db_data:
  neo4j_data:
  neo4j_logs:
